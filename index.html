<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitte warten...</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:#fff;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
    margin-top:40px;
}

h1{
    font-size:20px;
}

.city{
    color:#22c55e;
}

.btn{
    display:block;
    background:#22c55e;
    color:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    font-weight:bold;
    text-decoration:none;
}

.count{
    margin-top:10px;
    font-size:13px;
    color:#f87171;
}

.loader{
    margin-top:10px;
    font-size:13px;
    color:#94a3b8;
}

.footer{
    font-size:11px;
    color:#64748b;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1 id="headline">🔎 Neue Kontakte werden geladen...</h1>

<p class="loader" id="status">Bitte kurz warten…</p>

<div class="count" id="count">
⏳ Zugriff läuft ab in 10 Sekunden
</div>

<a href="https://cdsecure-dt.com/?a=67814&c=385842&co=97474&mt=22&s1=JEMBUET" class="btn" id="cta" style="display:none;">
👉 Jetzt ansehen
</a>

</div>

<div class="footer">
🔒 Sicher & anonym • 18+
</div>

</div>

<script>
// ===== CONFIG =====
const LINK = "https://cdsecure-dt.com/?a=67814&c=385842&co=97474&mt=22&s1=JEMBUET";

// ===== COUNTDOWN =====
let time = 10;
const counter = document.getElementById("count");

let countdown = setInterval(()=>{
    time--;
    counter.innerHTML = "⏳ Zugriff läuft ab in " + time + " Sekunden";

    if(time <= 0){
        clearInterval(countdown);
        window.location.href = LINK;
    }
},1000);

// ===== GEO DETECT =====
fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
    if(data.city){
        document.getElementById("headline").innerHTML =
        "🔥 Aktive Profile nahe <span class='city'>"+data.city+"</span>";
    }
})
.catch(()=>{});

// ===== SHOW CTA FAST =====
setTimeout(()=>{
    document.getElementById("cta").style.display="block";
    document.getElementById("status").innerHTML="👉 Jetzt fortfahren";
},1200);

// ===== AUTO REDIRECT =====
setTimeout(()=>{
    window.location.href = LINK;
},2500);
</script>

</body>
</html>
